# vim:fileencoding=utf-8:foldmethod=marker

# Ensure that kitty inherits the environment variables from the shell, which is important for things like $PATH and locale settings.
# This is especially relevant when launching kitty from a system launcher (./launch-actions.conf), as opposed to from another terminal.
# ref: https://sw.kovidgoyal.net/kitty/faq/#things-behave-differently-when-running-kitty-from-system-launcher-vs-from-another-terminal
env read_from_shell=PATH LANG LC_* XDG_* EDITOR VISUAL

# Font
# Nerd Fonts v3.4.0
symbol_map U+e000-U+e00a,U+e0a0-U+e0a2,U+e0a3,U+e0b0-U+e0b3,U+e0b4-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ea60-U+ec1e,U+ed00-U+efce,U+f000-U+f2ff,U+f300-U+f381,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono
font_family family="JetBrains Mono"
bold_font auto
italic_font auto
bold_italic_font auto
font_size 13.0

# window
placement_strategy center
remember_window_size no
initial_window_width 100c
initial_window_height 35c
window_padding_width 5
hide_window_decorations titlebar-only

# appearance
dynamic_background_opacity yes
background_opacity 0.9
background_blur 20

# macOS specific
macos_option_as_alt yes

# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME
